# Ensure full true color support in tmux
set-option -g default-terminal "screen-256color"

# Enable colored underlines (e.g. in Vim)
set -a terminal-features '*:usstyle'

# Enable true color for any 256-color terminal
set -ga terminal-overrides ",*256col*:Tc"

# fix the cursor shape https://github.com/neovim/neovim/issues/5096#issuecomment-469027417
set -ga terminal-overrides '*:Ss=\E[%p1%d q:Se=\E[ q'

# Use extended keys (CSI u)
set -g extended-keys on

# Update the TERM variable of terminal emulator when creating a new session or attaching an existing session
set -g update-environment 'DISPLAY SSH_ASKPASS SSH_AGENT_PID SSH_CONNECTION WINDOWID XAUTHORITY TERM'

# Set mouse mode on && yank with mouse
set -g mouse on
set -g @yank_with_mouse on

# Enable vim-style keys
setw -g mode-keys vi

# Set prefix
unbind C-b
set -g prefix C-Space
bind C-Space send-prefix

# Shift Alt vim keys to switch windows
bind -n M-H previous-window
bind -n M-L next-window

# Reorder windows
bind-key -n C-S-Left swap-window -t -1\; select-window -t -1
bind-key -n C-S-Right swap-window -t +1\; select-window -t +1

# Split window panes
bind '"' split-window -c '#{pane_current_path}'
bind % split-window -h -c '#{pane_current_path}'
# Add custom pane layouts
# 70/30 vertical split
bind | split-window -h -l 30% -c '#{pane_current_path}'

# Start windows and panes at 1, not 0
set -g base-index 1
set -g pane-base-index 1
set-window-option -g pane-base-index 1
set-option -g renumber-windows on

# Set window status to show current pane
set-option -g status-interval 1
set-option -g automatic-rename on
set-option -g automatic-rename-format '#{b:pane_current_path}'

# Set status-position to top
set-option -g status-position top

# Set the background color of the status bar
set -g status-bg default

# Set the delay time
set -sg escape-time 50

# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'Nybkox/tmux-ukiyo'

# Ukiyo configuration
# Select kanagawa theme
set -g @ukiyo-theme "kanagawa/wave" 
set -g @ukiyo-ignore-window-colors true

# Enable window flags
set -g @ukiyo-show-flags true

# NOTE: This section or the section below breaks the powerline
# Hide empty plugins
# set -g @ukiyo-show-empty-plugins false

# Enable powerline symbols
set -g @ukiyo-show-powerline true

# Switch powerline symbols
# set -g @ukiyo-show-left-sep ""
# set -g @ukiyo-show-right-sep ""

# NOTE: The below line does not make the powerline transparent
# Make powerline background transparent
# set -g @ukiyo-transparent-powerline-bg true

# the left separator symbol is inversed with a transparent background, you can modify it with any symbol you like
# set -g @ukiyo-inverse-divider ""

# Select ukiyo plugins (top-right)
set -g @ukiyo-plugins "git cwd ssh-session" 

# Configure plugin colors
set -g @ukiyo-git-colors "spring_green sumi_ink_0"
set -g @ukiyo-cwd-colors "lotus_teal_2 sumi_ink_0"
set -g @ukiyo-ssh-session-colors "surimi_orange sumi_ink_0"

# Configure ukiyo git plugin
# Default is ✓. Avoid using non unicode characters that bash uses like $, * and !
set -g @ukiyo-git-show-current-symbol "🗸"

# Default is unicode !. Avoid bash special characters
set -g @ukiyo-git-show-diff-symbol "!"

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'
